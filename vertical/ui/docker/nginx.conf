user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript application/wasm;

    # Mappa header per upgrade WebSocket / SSE
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;

        # Serve il frontend React (SPA)
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy verso le API Go
        # Supporta REST, SSE (chat streaming) e WebSocket
        location /api/ {
            proxy_pass http://api:8080/api/;
            proxy_http_version 1.1;

            # WebSocket & SSE
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disabilita buffering per SSE (chat streaming)
            proxy_buffering off;
            proxy_cache off;

            # Timeout esteso per SSE e upload documenti
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            # Upload documenti (PPTX, DOCX, PDF)
            client_max_body_size 50m;
        }
    }
}
